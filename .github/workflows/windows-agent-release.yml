name: Windows Agent Release

on:
  push:
    tags:
      - 'windows-agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version text written to package README.txt'
        required: false
        default: 'dev'
      runtime:
        description: 'dotnet publish runtime'
        required: false
        default: 'win-x64'
      package_name:
        description: 'Package/exe base name (e.g. acme-windows-agent)'
        required: false
        default: 'live-dashboard-windows-agent'
      display_name:
        description: 'Display name in README.txt'
        required: false
        default: 'Live Dashboard Windows Agent'
      tagline:
        description: 'Marketing copy line in README.txt'
        required: false
        default: 'Windows foreground reporter for Live Dashboard.'
      post_install_note:
        description: 'Post-install note in README.txt'
        required: false
        default: 'If you see "OK ..." in console, reporting works.'
      create_release:
        description: 'Publish GitHub Release after build'
        required: false
        default: true
        type: boolean

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve workflow inputs
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}"
            $releaseTag = "${{ github.ref_name }}"
            $runtime = "win-x64"
            $packageName = "live-dashboard-windows-agent"
            $displayName = "Live Dashboard Windows Agent"
            $tagline = "Windows foreground reporter for Live Dashboard."
            $postInstallNote = 'If you see "OK ..." in console, reporting works.'
            $createRelease = "true"
          } else {
            $version = "${{ inputs.version }}"
            if ([string]::IsNullOrWhiteSpace($version)) {
              $version = "dev"
            }

            $runtime = "${{ inputs.runtime }}"
            if ([string]::IsNullOrWhiteSpace($runtime)) {
              $runtime = "win-x64"
            }

            $packageName = "${{ inputs.package_name }}"
            if ([string]::IsNullOrWhiteSpace($packageName)) {
              $packageName = "live-dashboard-windows-agent"
            }

            $displayName = "${{ inputs.display_name }}"
            if ([string]::IsNullOrWhiteSpace($displayName)) {
              $displayName = "Live Dashboard Windows Agent"
            }

            $tagline = "${{ inputs.tagline }}"
            if ([string]::IsNullOrWhiteSpace($tagline)) {
              $tagline = "Windows foreground reporter for Live Dashboard."
            }

            $postInstallNote = "${{ inputs.post_install_note }}"
            if ([string]::IsNullOrWhiteSpace($postInstallNote)) {
              $postInstallNote = 'If you see "OK ..." in console, reporting works.'
            }

            $createRelease = "${{ inputs.create_release }}"
            if ([string]::IsNullOrWhiteSpace($createRelease)) {
              $createRelease = "true"
            }

            $releaseTag = "windows-agent-v$version"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "runtime=$runtime" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_name=$packageName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "display_name=$displayName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tagline=$tagline" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "post_install_note=$postInstallNote" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "create_release=$createRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build distributable zip
        shell: pwsh
        working-directory: packages/windows-agent
        run: |
          .\build-release.ps1 `
            -Version "${{ steps.vars.outputs.version }}" `
            -Runtime "${{ steps.vars.outputs.runtime }}" `
            -PackageName "${{ steps.vars.outputs.package_name }}" `
            -DisplayName "${{ steps.vars.outputs.display_name }}" `
            -Tagline "${{ steps.vars.outputs.tagline }}" `
            -PostInstallNote "${{ steps.vars.outputs.post_install_note }}"

      - name: Resolve zip output
        id: package
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "packages/windows-agent/dist" -Filter "*.zip" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $zip) {
            throw "No zip found under packages/windows-agent/dist"
          }

          "zip_path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent-package
          path: ${{ steps.package.outputs.zip_path }}

      - name: Publish GitHub Release
        if: steps.vars.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          files: ${{ steps.package.outputs.zip_path }}

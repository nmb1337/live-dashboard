name: Build Agents

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      windows_ref:
        description: 'Windows source branch/tag/SHA (default: main)'
        default: 'main'
      macos_ref:
        description: 'macOS source branch/tag/SHA (default: main)'
        default: 'main'
      android_ref:
        description: 'Android source branch/tag/SHA (default: main)'
        default: 'main'

# Architecture: Tag-triggered builds should compile the exact tagged commit.
# Manual runs can override source refs via workflow_dispatch inputs.

jobs:
  build-windows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.windows_ref || 'windows-source' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r agents/windows/requirements.txt pyinstaller
      - name: Build executable
        working-directory: agents/windows
        run: pyinstaller --onefile --noconsole --name live-dashboard-agent agent.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: agents/windows/dist/live-dashboard-agent.exe

  build-macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.macos_ref || 'macos-source' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r agents/macos/requirements.txt pyinstaller
      - name: Build executable
        working-directory: agents/macos
        run: pyinstaller --onefile --windowed --name live-dashboard-agent agent.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos-agent
          path: agents/macos/dist/live-dashboard-agent

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.android_ref || github.sha }}
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
      - name: Resolve Android build mode
        id: signing_mode
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          signing_ready=true
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              signing_ready=false
            fi
          done

          if [[ "${GITHUB_REF}" == refs/tags/* && "$signing_ready" == "true" ]]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "signing_ready=true" >> "$GITHUB_OUTPUT"
            echo "Tag build: signing secrets detected, using release build."
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "signing_ready=false" >> "$GITHUB_OUTPUT"
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "Tag build: signing secrets missing, fallback to debug build."
            fi
          fi
      - name: Decode Android keystore
        if: steps.signing_mode.outputs.signing_ready == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-release.keystore"
      - name: Build Android APK
        working-directory: packages/android-agent
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ "${{ steps.signing_mode.outputs.mode }}" == "release" ]]; then
            gradle -q :app:assembleRelease
          else
            gradle -q :app:assembleDebug
          fi
      - name: Prepare APK artifact
        run: |
          if [[ "${{ steps.signing_mode.outputs.mode }}" == "release" ]]; then
            APK_PATH=$(find packages/android-agent/app/build/outputs/apk/release -maxdepth 1 -type f -name "*release*.apk" | head -n 1)
          else
            APK_PATH=$(find packages/android-agent/app/build/outputs/apk/debug -maxdepth 1 -type f -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found under expected output directory"
            ls -la packages/android-agent/app/build/outputs/apk/debug || true
            ls -la packages/android-agent/app/build/outputs/apk/release || true
            exit 1
          fi
          cp "$APK_PATH" live-dashboard-android-agent.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-agent
          path: live-dashboard-android-agent.apk

  build-windows-dotnet:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.android_ref || github.sha }}
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Resolve Windows package version
        id: winver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "dev-${{ github.run_number }}"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Build Windows package zip
        shell: pwsh
        working-directory: packages/windows-agent
        run: |
          .\build-release.ps1 `
            -Version "${{ steps.winver.outputs.version }}" `
            -Runtime "win-x64" `
            -PackageName "live-dashboard-windows-agent" `
            -DisplayName "Live Dashboard Windows Agent"
      - name: Resolve Windows zip artifact
        id: winzip
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "packages/windows-agent/dist" -Filter "live-dashboard-windows-agent-*.zip" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $zip) {
            throw "No Windows zip package found under packages/windows-agent/dist"
          }

          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: actions/upload-artifact@v4
        with:
          name: windows-agent-dotnet
          path: ${{ steps.winzip.outputs.path }}

  release:
    needs: [build-android, build-windows-dotnet]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-agent
          path: android-agent
      - uses: actions/download-artifact@v4
        with:
          name: windows-agent-dotnet
          path: windows-agent
      - name: Prepare release assets
        run: |
          mv android-agent/live-dashboard-android-agent.apk .
          cp windows-agent/*.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            live-dashboard-android-agent.apk
            live-dashboard-windows-agent-*.zip
